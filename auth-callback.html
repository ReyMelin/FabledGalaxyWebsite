<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Signing you in...</title>
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="styles.css">

  <!-- IMPORTANT: UMD build so window.supabase exists -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="./supabaseClient.js"></script>
</head>

<body>
  <p>Signing you in…</p>

  <script>
    (async () => {
      // wait for window.sb
      await new Promise(r => {
        if (window.sb) return r();
        const t = setInterval(() => (window.sb ? (clearInterval(t), r()) : null), 50);
      });

      const url = new URL(window.location.href);

      // If Supabase returned with ?code=..., exchange it for a session
      if (url.searchParams.get("code")) {
        const { error } = await window.sb.auth.exchangeCodeForSession(window.location.href);
        if (error) console.warn("exchangeCodeForSession:", error.message);
      }

      // Read session/user (optional debug)
      const { data: sessionData, error: sessErr } = await window.sb.auth.getSession();
      if (sessErr) console.warn("getSession:", sessErr.message);
      else console.log("Session data:", sessionData);

      const { data: { user }, error: userErr } = await window.sb.auth.getUser();
      if (userErr) console.warn("getUser:", userErr.message);
      else console.log("User:", user);

      // clear tokens from URL (hash and code)
      if (window.location.hash || url.searchParams.get("code")) {
        history.replaceState(null, "", window.location.pathname);
      }

      // redirect back
      const next = localStorage.getItem("fg_next") || "index.html";
      localStorage.removeItem("fg_next");
      window.location.replace(next);
    })();
  </script>
</body>
</html>
