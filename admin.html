<!-- admin.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Admin Panel | Fabled Galaxy</title>
  <link rel="stylesheet" href="styles.css?v=20260209" />
</head>

<body>
  <div class="starfield"></div>

  <div class="admin-container">
    <header class="admin-header">
      <h1 class="admin-title">Admin Panel</h1>
      <p class="admin-subtitle">Review and manage pending world submissions</p>
      <div id="auth-container"></div>
    </header>

    <a href="index.html" class="back-link">← Back to Home</a>

    <main id="main-content">
      <div class="loading">Loading...</div>

      <section class="admin-card">
        <div class="admin-card-content">
          <h2>Pending Worlds</h2>
          <div id="worlds-list" class="worlds-list"></div>
        </div>
      </section>

      <section class="admin-card upload-art-section">
        <div class="upload-art-box drag-drop-box">
          <div class="upload-art-title">Upload Art</div>

          <div class="upload-art-dropzone" id="upload-dropzone">
            <span>
              Drag &amp; drop art here, or
              <label class="upload-art-browse">
                <input type="file" accept="image/*" id="art-file-input">
                browse
              </label>
            </span>
          </div>

          <div class="upload-art-controls">
            <label class="upload-art-label">Pick a world:
              <select id="art-world-select" class="upload-art-select"></select>
            </label>
          </div>

          <div class="upload-preview" id="art-preview"></div>
          <div class="muted" id="art-status"></div>

          <button id="art-upload-btn" class="btn upload-art-btn">Upload & Attach</button>
        </div>
      </section>
    </main>
  </div>

  <!-- Scripts at the END -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabaseClient.js?v=20260209"></script>
  <script src="./admin.js?v=20260209"></script>
</body>
</html>
